name: "Test"

on: 
  push:
  pull_request:
  workflow_dispatch:

jobs:
  Test:
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: 
        host: [windows-latest, ubuntu-latest, macos-26-intel]

    steps:
      - uses: actions/checkout@v6
      - name: Setup NASM
        uses: ilammy/setup-nasm@v1
      - name: Print NASM version
        run: nasm -v
      - uses: actions/setup-python@v6
      - run: python -m pip install -U pytest
      - run: make test
